name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t simple-web:latest .

      - name: Export Docker image
        run: docker save simple-web:latest -o simple-web.tar

      - name: Compress image
        run: gzip simple-web.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: simple-web.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer image to server
        run: |
          scp -o StrictHostKeyChecking=no simple-web.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd /tmp
            gunzip -f simple-web.tar.gz
            docker load -i simple-web.tar
            rm -f simple-web.tar simple-web.tar.gz
            cd /root
            # 尝试使用 docker compose（新方式），如果失败则用 docker-compose（旧方式）
            if command -v docker-compose &> /dev/null; then
              docker-compose -f docker-compose.prod.yml down || true
              docker-compose -f docker-compose.prod.yml up -d
            else
              docker compose -f docker-compose.prod.yml down || true
              docker compose -f docker-compose.prod.yml up -d
            fi
          ENDSSH
